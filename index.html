<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bucket List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1><span class="bucket-icon">🪣</span> The Bucket List</h1>
            <p class="subtitle">Victoria Summer Countdown</p>
            <p class="instructions">Click to expand · Swipe left to delete · Tap a date to schedule</p>
        </header>

        <div class="main-layout">
            <section class="thoughts-section">
                <div class="section-header">
                    <h2>👀 Thoughts</h2>
                    <button id="add-btn" class="add-btn" title="Toss one in">+</button>
                </div>
                <form id="activity-form" class="activity-form hidden">
                    <input type="text" id="activity-name" placeholder="What's on the list?" required>
                    <input type="text" id="activity-location" placeholder="📍 Location (optional)">
                    <input type="url" id="activity-link" placeholder="🔗 Link (optional)">
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Toss it in!</button>
                        <button type="button" id="cancel-add" class="btn btn-secondary">Nah</button>
                    </div>
                </form>
                <div class="kanban-items" id="col-thoughts" data-column="thoughts"></div>

                <div class="nah-section collapsed">
                    <div class="nah-toggle" id="nah-toggle">
                        <span>🚫 Nah (<span id="nah-count">0</span>)</span>
                        <span class="section-arrow">▸</span>
                    </div>
                    <div class="nah-content">
                        <div class="kanban-items" id="col-nah" data-column="nah"></div>
                    </div>
                </div>
            </section>

            <section class="calendar-section">
                <div class="calendar-and-yuh">
                    <div class="calendar-panel">
                        <div class="calendar-nav">
                            <button id="prev-month" class="nav-btn">&larr;</button>
                            <h2 id="month-label"></h2>
                            <button id="next-month" class="nav-btn">&rarr;</button>
                        </div>
                        <div class="calendar-grid">
                            <div class="day-header">Sun</div>
                            <div class="day-header">Mon</div>
                            <div class="day-header">Tue</div>
                            <div class="day-header">Wed</div>
                            <div class="day-header">Thu</div>
                            <div class="day-header">Fri</div>
                            <div class="day-header">Sat</div>
                            <div id="calendar-days" class="calendar-days"></div>
                        </div>
                    </div>
                    <div class="yuh-panel">
                        <h3>🤝 Yuh</h3>
                        <div id="scheduled-list" class="scheduled-list"></div>
                    </div>
                </div>

                <div class="unavailability-section collapsed">
                    <div class="unavail-header" id="unavail-section-toggle">
                        <h3>Mark Unavailable</h3>
                        <span class="section-arrow">▸</span>
                    </div>
                    <div class="unavail-content">
                        <form id="unavail-form">
                            <div class="date-range">
                                <input type="date" id="unavail-start" required>
                                <span>to</span>
                                <input type="date" id="unavail-end" required>
                            </div>
                            <input type="text" id="unavail-reason" placeholder="Description (optional)">
                            <button type="submit" class="btn btn-block">Block it off</button>
                        </form>
                        <ul id="unavail-list" class="unavail-list"></ul>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div id="date-picker-popover" class="popover hidden"></div>
    <div id="toast" class="toast hidden"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
