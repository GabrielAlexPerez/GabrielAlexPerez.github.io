<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bucket List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1><span class="bucket-icon">🪣</span> The Bucket List</h1>
            <p class="subtitle">Drag your dreams onto the calendar</p>
        </header>

        <div class="main-layout">
            <section class="calendar-section">
                <div class="calendar-nav">
                    <button id="prev-month" class="nav-btn">&larr;</button>
                    <h2 id="month-label"></h2>
                    <button id="next-month" class="nav-btn">&rarr;</button>
                </div>
                <div class="calendar-grid">
                    <div class="day-header">Sun</div>
                    <div class="day-header">Mon</div>
                    <div class="day-header">Tue</div>
                    <div class="day-header">Wed</div>
                    <div class="day-header">Thu</div>
                    <div class="day-header">Fri</div>
                    <div class="day-header">Sat</div>
                    <div id="calendar-days" class="calendar-days"></div>
                </div>

                <div class="unavailability-section">
                    <div class="unavail-header">
                        <h3>Mark Unavailable</h3>
                        <button id="toggle-unavail" class="toggle-btn">+</button>
                    </div>
                    <form id="unavail-form" class="unavail-form hidden">
                        <input type="text" id="unavail-person" placeholder="Who's unavailable?" required>
                        <div class="date-range">
                            <input type="date" id="unavail-start" required>
                            <span>to</span>
                            <input type="date" id="unavail-end" required>
                        </div>
                        <button type="submit" class="btn btn-block">Block it off</button>
                    </form>
                    <ul id="unavail-list" class="unavail-list"></ul>
                </div>
            </section>

            <section class="bucket-section">
                <div class="bucket-header">
                    <h2>The Bucket</h2>
                    <button id="add-btn" class="add-btn" title="Toss one in">+</button>
                </div>

                <form id="activity-form" class="activity-form hidden">
                    <input type="text" id="activity-name" placeholder="What's on the list?" required>
                    <select id="activity-priority">
                        <option value="hot">🔥 Hot priority</option>
                        <option value="warm" selected>☀️ Warm priority</option>
                        <option value="chill">🧊 Chill priority</option>
                    </select>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Drop it in!</button>
                        <button type="button" id="cancel-add" class="btn btn-secondary">Nah</button>
                    </div>
                </form>

                <div class="bucket-container">
                    <div class="bucket-rim"></div>
                    <div class="bucket-body" id="bucket-list">
                        <p class="bucket-empty">Bucket's empty!<br>Hit + to toss something in.</p>
                    </div>
                    <div class="bucket-base"></div>
                </div>

                <p class="bucket-hint">Drag items onto the calendar to schedule them<br>Click an item to remove it</p>
            </section>
        </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script src="app.js"></script>
</body>
</html>
